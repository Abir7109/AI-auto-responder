<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Banner Generator</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; flex-direction: column; gap: 20px; font-family: Inter, sans-serif; }
        #banner {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .glow-1 {
            position: absolute; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(34,211,238,0.3) 0%, transparent 70%);
            top: -100px; left: -50px;
        }
        .glow-2 {
            position: absolute; width: 350px; height: 350px; border-radius: 50%;
            background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, transparent 70%);
            bottom: -80px; right: -30px;
        }
        .glow-3 {
            position: absolute; width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, rgba(34,211,238,0.15) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .content {
            position: relative; z-index: 2; text-align: center; color: white;
            display: flex; flex-direction: column; align-items: center; gap: 24px;
        }
        .logo-row {
            display: flex; align-items: center; gap: 20px;
        }
        .logo-circle {
            width: 80px; height: 80px; border-radius: 20px;
            background: linear-gradient(135deg, #22d3ee, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 800; color: white;
            box-shadow: 0 10px 40px rgba(34,211,238,0.3);
        }
        .app-name {
            font-size: 28px; font-weight: 700; color: rgba(255,255,255,0.9);
            letter-spacing: 0.5px;
        }
        .tagline {
            font-size: 56px; font-weight: 800; line-height: 1.15;
            max-width: 800px;
        }
        .gradient-text {
            background: linear-gradient(135deg, #22d3ee 0%, #8b5cf6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 22px; color: rgba(255,255,255,0.6);
            max-width: 700px; line-height: 1.5;
        }
        .platforms {
            display: flex; gap: 16px; margin-top: 8px;
        }
        .platform-badge {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 20px; border-radius: 50px; font-size: 15px; color: rgba(255,255,255,0.8);
            font-weight: 500;
        }
        .download-badge {
            margin-top: 8px; background: white; color: #1a1a1a;
            padding: 14px 36px; border-radius: 50px; font-size: 18px; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .dots {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .corner-line {
            position: absolute; width: 200px; height: 200px; border: 2px solid rgba(34,211,238,0.1);
            border-radius: 0;
        }
        .corner-tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .corner-br { bottom: 30px; right: 30px; border-left: none; border-top: none; }
        button {
            padding: 12px 32px; font-size: 16px; font-weight: 600;
            background: #1a1a1a; color: white; border: none; border-radius: 12px;
            cursor: pointer;
        }
        button:hover { background: #333; }
    </style>
</head>
<body>
    <div id="banner">
        <div class="dots"></div>
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        <div class="glow-3"></div>
        <div class="corner-line corner-tl"></div>
        <div class="corner-line corner-br"></div>
        <div class="content">
            <div class="logo-row">
                <div class="logo-circle">AI</div>
                <div class="app-name">AI AutoResponder</div>
            </div>
            <div class="tagline">Never Miss a Message.<br><span class="gradient-text">Let AI Reply For You.</span></div>
            <div class="subtitle">Automatically respond to WhatsApp, Messenger, Telegram, Instagram & more</div>
            <div class="platforms">
                <div class="platform-badge">WhatsApp</div>
                <div class="platform-badge">Messenger</div>
                <div class="platform-badge">Telegram</div>
                <div class="platform-badge">Instagram</div>
            </div>
            <div class="download-badge">
                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Download Free APK
            </div>
        </div>
    </div>
    <div style="display: flex; gap: 12px;">
        <button onclick="downloadBanner()">Download as PNG (1200x630)</button>
        <button onclick="downloadBannerJPG()">Download as JPG (1200x630)</button>
    </div>
    <p style="color: #666; font-size: 14px;">Save the image as <code>og-banner.png</code> and place it in the website/ folder</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function downloadBanner() {
            html2canvas(document.getElementById('banner'), { width: 1200, height: 630, scale: 1, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'og-banner.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
        function downloadBannerJPG() {
            html2canvas(document.getElementById('banner'), { width: 1200, height: 630, scale: 1, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'og-banner.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            });
        }
    </script>
</body>
</html>
